name: Deploy to Ubuntu with PM2

on:
  push:
    branches:
      - main
      # เพิ่ม branch อื่นถ้าต้องการ deploy จาก branch นั้น
      # - feature/uploadfile

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Copy dist to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/*"
          target: "${{ secrets.APP_DIR }}/dist"

      - name: Copy ecosystem config to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "ecosystem.config.cjs"
          target: "${{ secrets.APP_DIR }}/"

      - name: Restart app with PM2 (ecosystem)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.APP_DIR }}
            echo "Current directory: $(pwd)"
            echo "Files:"
            ls -la

            # ถ้ามี process เดิมอยู่ให้ reload จาก ecosystem (.cjs), ถ้าไม่มีก็ start จาก ecosystem (.cjs)
            if pm2 describe manufacturing-blog > /dev/null; then
              pm2 reload ecosystem.config.cjs --only manufacturing-blog
            else
              pm2 start ecosystem.config.cjs --only manufacturing-blog
            fi

            pm2 save